# Sentinel dark theme — "modern fintech terminal": one mint accent, monospace numbers.
[theme]
base = "dark"
primaryColor = "#00E5A0"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#161B22"
textColor = "#E6EDF3"
font = "monospace"

[server]
headless = true

[browser]
gatherUsageStats = false
